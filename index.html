<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillQ</title>
  <link rel="stylesheet" href="/css/skillq.css" />

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const route = params.get('route');
      if (route) {
        const routeQuery = params.get('routeQuery') || '';
        const restored = route + routeQuery + window.location.hash;
        history.replaceState(null, '', restored);
      }
    })();
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="/js/DexieStore.js"></script>
  <script defer src="/js/helpers.js"></script>
  <script defer src="/js/components.js"></script>
  <script defer src="/js/SimpleESI.js"></script>
  <script defer src="/js/esi.js"></script>
  <script defer src="/js/tools.js"></script>
  <script defer src="/js/codec.js"></script>
  <script defer src="/js/app.js"></script>
</head>
<body>

  <!-- Navbar (injected by components.js via app.js) -->
  <div id="navbar-root"></div>

  <!-- Logged-in app shell (hidden until authenticated) -->
  <div id="skillq" class="d-none">
    <div id="char-cards-root" class="sq-char-cards"></div>
    <div id="net-summary" class="sq-net-summary d-none"></div>
    <div id="char-view-root"></div>
  </div>

  <!-- Not logged in: README content injected here -->
  <div id="about" class="sq-hero d-none"></div>

</body>
</html>
